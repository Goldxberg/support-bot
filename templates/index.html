<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Bot — Bilingual AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-left h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-left p { color: #666; font-size: 13px; margin-top: 4px; }
    .lang-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      color: #3b82f6;
    }
    .clear-btn {
      padding: 8px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 15px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user {
      align-self: flex-end;
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #222;
      color: #ddd;
      border-bottom-left-radius: 4px;
    }
    .message.bot strong { color: #fff; }
    .message.bot code { background: #0a0a0a; padding: 2px 6px; border-radius: 4px; color: #06b6d4; }
    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }
    .welcome h2 {
      font-size: 28px;
      color: #888;
      margin-bottom: 12px;
    }
    .welcome .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .welcome .example {
      padding: 8px 16px;
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      font-size: 14px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .welcome .example:hover { border-color: #3b82f6; color: #3b82f6; }
    .typing {
      align-self: flex-start;
      padding: 14px 18px;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      color: #666;
      font-size: 14px;
    }
    .typing span { animation: blink 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      gap: 12px;
    }
    .input-area input {
      flex: 1;
      padding: 14px 20px;
      background: #111;
      border: 1px solid #333;
      border-radius: 24px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #3b82f6; }
    .input-area button {
      padding: 14px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .input-area button:hover { background: #2563eb; }
    .input-area button:disabled { background: #333; cursor: not-allowed; }
    footer {
      text-align: center;
      padding: 12px;
      color: #222;
      font-size: 12px;
    }
    footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Support Bot</h1>
      <p>Bilingual AI Assistant <span class="lang-badge">EN / עב</span></p>
    </div>
    <button class="clear-btn" onclick="clearChat()">New Chat</button>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <h2>How can I help?</h2>
      <p>Ask in English or Hebrew — I'll respond in your language</p>
      <div class="examples">
        <div class="example" onclick="sendExample(this)">How do I reset my password?</div>
        <div class="example" onclick="sendExample(this)">?מה תוכנית המחירים</div>
        <div class="example" onclick="sendExample(this)">I need to upgrade my plan</div>
        <div class="example" onclick="sendExample(this)">יש לי בעיה טכנית</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Type your message... / ...הקלד הודעה" autofocus>
    <button id="sendBtn" onclick="send()">Send</button>
  </div>

  <footer>
    Built by <a href="https://github.com/Goldxberg">Ariel Goldberg</a> — Python + Claude API + Flask
  </footer>

  <script>
    const input = document.getElementById('msgInput');
    const chatArea = document.getElementById('chatArea');
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) send(); });

    function sendExample(el) {
      input.value = el.textContent;
      send();
    }

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;

      // Remove welcome
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      // Add user message
      addMessage(msg, 'user');
      input.value = '';

      // Show typing
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span>.</span><span>.</span><span>.</span>';
      chatArea.appendChild(typing);
      chatArea.scrollTop = chatArea.scrollHeight;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await resp.json();
        typing.remove();

        if (data.error) {
          addMessage('Error: ' + data.error, 'bot');
        } else {
          addMessage(data.response, 'bot');
        }
      } catch (err) {
        typing.remove();
        addMessage('Connection error: ' + err.message, 'bot');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      // Simple markdown for bot messages
      if (role === 'bot') {
        div.innerHTML = text
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.+?)`/g, '<code>$1</code>')
          .replace(/^\d+\. /gm, '<br>&bull; ')
          .replace(/^- /gm, '<br>&bull; ')
          .replace(/\n\n/g, '<br><br>')
          .replace(/\n/g, '<br>');
      } else {
        div.textContent = text;
      }
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function clearChat() {
      await fetch('/api/clear', { method: 'POST' });
      chatArea.innerHTML = `<div class="welcome" id="welcome">
        <h2>How can I help?</h2>
        <p>Ask in English or Hebrew — I'll respond in your language</p>
        <div class="examples">
          <div class="example" onclick="sendExample(this)">How do I reset my password?</div>
          <div class="example" onclick="sendExample(this)">?מה תוכנית המחירים</div>
          <div class="example" onclick="sendExample(this)">I need to upgrade my plan</div>
          <div class="example" onclick="sendExample(this)">יש לי בעיה טכנית</div>
        </div>
      </div>`;
    }
  </script>
</body>
</html>
